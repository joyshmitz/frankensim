[package]
name = "fs-report"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Automatic lab notebooks + semantic design diffs (fs-report): every study emits a deterministic, content-addressed, human-readable report that INCLUDES THE EXACT IR TO REPRODUCE IT — reproducibility as a side effect, not a virtue. Plus semantic_diff, a per-feature geometric attribution (moved/thinned features with units) rather than a file diff."

[package.metadata.frankensim]
layer = "L6"

[dependencies]
fs-evidence = { path = "../fs-evidence" }
fs-obs = { path = "../fs-obs" }
fs-package = { path = "../fs-package" }
fs-project = { path = "../fs-project" }
fs-regime = { path = "../fs-regime" }
fs-session = { path = "../fs-session" }

[dev-dependencies]
fs-blake3 = { path = "../fs-blake3" }
fs-qty = { path = "../fs-qty" }
fs-voi = { path = "../fs-voi" }

[lints]
workspace = true
