[package]
name = "fs-flywheel-e2e"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "FLYWHEEL CLOSES: the whole-loop e2e harness proving 9->2->10->E compound (super-additive speedup, colors end-to-end, G4 storm + G5 determinism across the loop)."

[package.metadata.frankensim]
layer = "L6"

[dependencies]
fs-benchmark = { path = "../fs-benchmark" }
fs-evidence = { path = "../fs-evidence" }
fs-geom = { path = "../fs-geom", features = ["sheaf-merge"] }
fs-ledger = { path = "../fs-ledger" }
fs-qty = { path = "../fs-qty" }
fs-recompute = { path = "../fs-recompute", features = ["tolerance-invalidation"] }
fs-spececo = { path = "../fs-spececo" }
fs-verify = { path = "../fs-verify", features = ["certified-speculation"] }

[dev-dependencies]
asupersync = { path = "../../../asupersync", features = ["test-internals"] }
fs-adjoint = { path = "../fs-adjoint", features = ["explanation-objects"] }
fs-alloc = { path = "../fs-alloc" }
fs-asbuilt = { path = "../fs-asbuilt" }
fs-blake3 = { path = "../fs-blake3" }
fs-checker = { path = "../fs-checker" }
fs-surrogate = { path = "../fs-surrogate", features = ["abstraction-ladder"] }
fs-symmetry = { path = "../fs-symmetry" }
fs-time = { path = "../fs-time", features = ["time-slabs"] }
fs-ir = { path = "../fs-ir", features = ["ladder-planner"] }
fs-plan = { path = "../fs-plan", features = ["voi-queries"] }
fs-package = { path = "../fs-package" }
fs-robust = { path = "../fs-robust" }
fs-verify = { path = "../fs-verify", features = ["certified-speculation"] }
fs-ledger = { path = "../fs-ledger" }
fs-exec = { path = "../fs-exec" }

[features]
# [F]-gated per the Ambition-Tag rule: the flagship loop harness ships
# disabled until its Gauntlet tier + kill metric are green.
flywheel-e2e = []

[lints]
workspace = true

