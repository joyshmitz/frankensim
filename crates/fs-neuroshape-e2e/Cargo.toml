description = "NeuroShapeCert: certified facts about a learned neural implicit shape — a Lipschitz bound, interval-sign-margin sphere tracing, and interval evidence that at least one negative component exists and is enclosed by a positive closed frame. The frame yields only a component-count lower bound, never an exact global count; sampled contours and a local finite-difference Hessian remain non-authoritative cross-checks."

