[package]
name = "fs-plan"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Per-operator cost/error models, Error Ledger and Time Ledger attribution, Rep Router cost oracle."

[package.metadata.frankensim]
layer = "L6"

[dependencies]
asupersync = { path = "../../../asupersync", optional = true }
fs-dfo = { path = "../fs-dfo", optional = true }
fs-blake3 = { path = "../fs-blake3" }
fs-evidence = { path = "../fs-evidence" }
fs-eproc = { path = "../fs-eproc", optional = true }
fs-geom = { path = "../fs-geom" }
fs-ladder = { path = "../fs-ladder" }
fs-ledger = { path = "../fs-ledger" }

[dev-dependencies]
asupersync = { path = "../../../asupersync", features = ["test-internals"] }
fs-alloc = { path = "../fs-alloc" }
fs-conduction = { path = "../fs-conduction" }
fs-convection = { path = "../fs-convection" }
fs-exec = { path = "../fs-exec" }
fs-matdb = { path = "../fs-matdb" }

[features]
# [F]-gated per the Ambition-Tag rule (bead knh1.6, Proposal C).
voi-queries = ["dep:asupersync", "dep:fs-eproc"]
# [M]-gated (bead gp3.9): the co-optimizing allocator. Ships OFF; the
# promotion gate (beats hand allocation on all three flagships) is the
# huq.15 milestone's Gauntlet call — the fixture-matrix scoreboard here
# is necessary, not sufficient.
moonshot-planner = ["dep:fs-dfo"]

[[test]]
name = "alloc_battery"

[[test]]
name = "moonshot_battery"
required-features = ["moonshot-planner"]

[[test]]
name = "fidelity_campaign"

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "voi"
required-features = ["voi-queries"]
