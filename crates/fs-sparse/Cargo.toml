[package]
name = "fs-sparse"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Sparse formats (CSR/BSR/SELL-C-sigma), deterministic assembly, SpMV/SpMM, AMG."

[package.metadata.frankensim]
layer = "L1"

[dependencies]
# Constellation interop (bead gtql) — OPTIONAL, off by default so L1 stays
# dependency-lean. fnx-classes' GraphSnapshot is string-keyed and owned, so the
# converters copy (no zero-copy path in that direction); fnx-runtime carries
# CompatibilityMode/CgseValue. Precedent: fs-truss, fs-rep-voxel.
fnx-classes = { path = "../../../franken_networkx/crates/fnx-classes", optional = true }
fnx-runtime = { path = "../../../franken_networkx/crates/fnx-runtime", optional = true }
fnp-ufunc = { path = "../../../franken_numpy/crates/fnp-ufunc", optional = true }
fnp-dtype = { path = "../../../franken_numpy/crates/fnp-dtype", optional = true }

[features]
# FrankenNetworkx GraphSnapshot <-> Csr converters (crate::interop).
fnx-interop = ["dep:fnx-classes", "dep:fnx-runtime"]
# FrankenNumpy UFuncArray <-> Csr converters (crate::interop_fnp).
fnp-interop = ["dep:fnp-ufunc", "dep:fnp-dtype"]

[dev-dependencies]
# Roofline lane only (dev-deps are layer-exempt): STREAM triad reference.
fs-propcheck = { path = "../fs-propcheck" }
fs-substrate = { path = "../fs-substrate" }

[lints]
workspace = true
