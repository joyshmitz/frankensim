[package]
name = "fs-surrogate"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Learned accelerators with guarantees (fs-surrogate): classical reduced-order models permitted ONLY inside certified validity bands — ML proposes, certified numerics disposes. A POD reduced-order model (method of snapshots), distribution-free conformal prediction bands with empirical coverage, and the certify-or-escalate policy that uses the surrogate only when its band is narrow enough for the decision."

[package.metadata.frankensim]
layer = "L4"

[dependencies]
asupersync = { path = "../../../asupersync", optional = true }
fs-alloc = { path = "../fs-alloc", optional = true }
fs-blake3 = { path = "../fs-blake3", optional = true }
fs-evidence = { path = "../fs-evidence", optional = true }
fs-exec = { path = "../fs-exec", optional = true }

[features]
# [F]-gated per the Ambition-Tag rule (bead knh1.4, Proposal A).
abstraction-ladder = [
    "dep:asupersync",
    "dep:fs-alloc",
    "dep:fs-blake3",
    "dep:fs-evidence",
    "dep:fs-exec",
]

[dev-dependencies]
asupersync = { path = "../../../asupersync", features = ["test-internals"] }
fs-evidence = { path = "../fs-evidence" }

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "ladder"
required-features = ["abstraction-ladder"]
