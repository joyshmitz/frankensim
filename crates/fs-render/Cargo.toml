[package]
name = "fs-render"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Unbiased spectral path-tracing core (fs-render): the verifiable Monte-Carlo foundations — deterministic low-discrepancy sampling, cosine-weighted hemisphere sampling with a Lambertian FURNACE test (energy conservation to exactness), MIS balance/power heuristics with weight-sum audits (no energy loss/gain at strategy boundaries), and hero-wavelength spectral integration. CPU-native, deterministic, replayable."

[package.metadata.frankensim]
layer = "L5"

[dependencies]
fs-ad = { path = "../fs-ad", optional = true }
fs-evidence = { path = "../fs-evidence", optional = true }
fs-exec = { path = "../fs-exec", optional = true }
fs-geom = { path = "../fs-geom", optional = true }
fs-img = { path = "../fs-img", optional = true }
fs-math = { path = "../fs-math" }
fs-rand = { path = "../fs-rand", optional = true }
fs-rep-nurbs = { path = "../fs-rep-nurbs", optional = true }

[dev-dependencies]
asupersync = { path = "../../../asupersync" }
fs-alloc = { path = "../fs-alloc" }
fs-lbm = { path = "../fs-lbm" }
fs-rep-frep = { path = "../fs-rep-frep" }

[features]
# [S] The certified sphere-tracing and deterministic scalar-BVH backends are
# selected as production defaults by frankensim-8ll9. Closeout still requires
# the recorded adversarial, workspace, nested-Wasm, and four-quadrant gates.
# The wider SIMD BVH and ray-rate claims remain separate perf-evidence work.
default = ["chart-backends"]
chart-backends = ["dep:fs-evidence", "dep:fs-exec", "dep:fs-geom", "dep:fs-rep-nurbs"]
# [F]-gated per the Ambition-Tag rule: volumetric media ship disabled
# until the live-field progressive lane lands in perf-CI.
volumes = ["dep:fs-rand"]
# [F]-gated per the Ambition-Tag rule (bead qfx.5): edge-aware
# differentiable rendering, smoke tier (deterministic quadrature;
# MC/reparameterized estimators are recorded successors).
differentiable = ["chart-backends", "dep:fs-ad"]
# [F]-gated per the Ambition-Tag rule (bead 872c): the spectral path
# tracer v1 — hero-wavelength MIS over the chart backends, EXR out.
tracer = ["chart-backends", "dep:fs-rand", "dep:fs-img"]

[[test]]
name = "volumes_battery"
required-features = ["volumes"]

[[test]]
name = "tracer_battery"
required-features = ["tracer"]

[[test]]
name = "diff_battery"
required-features = ["differentiable"]

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "charts"
required-features = ["chart-backends"]
