[package]
name = "fs-render"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Unbiased spectral path-tracing core (fs-render): the verifiable Monte-Carlo foundations — deterministic low-discrepancy sampling, cosine-weighted hemisphere sampling with a Lambertian FURNACE test (energy conservation to exactness), MIS balance/power heuristics with weight-sum audits (no energy loss/gain at strategy boundaries), and hero-wavelength spectral integration. CPU-native, deterministic, replayable."

[package.metadata.frankensim]
layer = "L5"

[dependencies]
fs-exec = { path = "../fs-exec", optional = true }
fs-geom = { path = "../fs-geom", optional = true }
fs-rep-nurbs = { path = "../fs-rep-nurbs", optional = true }

[dev-dependencies]
asupersync = { path = "../../../asupersync" }
fs-alloc = { path = "../fs-alloc" }
fs-rep-frep = { path = "../fs-rep-frep" }

[features]
# [F]-gated per the Ambition-Tag rule: chart backends ship disabled
# until the tunneling audit + ray-rate gates are green in perf-CI.
chart-backends = ["dep:fs-exec", "dep:fs-geom", "dep:fs-rep-nurbs"]

[lints]
workspace = true
