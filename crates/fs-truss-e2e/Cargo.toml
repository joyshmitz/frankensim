description = "TrussPath: minimum-weight truss topology optimization (Michell ground structure, solved by PDHG with a certified primal-dual optimality gap) PLUS a tropical (max-plus) critical LOAD PATH that names the dominant load-transmission chain from load to support and its bottleneck member. Composes fs-truss (ground-structure LP + PDHG certificate) x fs-tropical (critical path) x fs-evidence (Verified optimality + Verified load path). Groundbreaking: an optimal structure that comes with BOTH a certificate it is near-optimal AND a proof-carrying account of how the load actually flows through it."

