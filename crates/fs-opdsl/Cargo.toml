[package]
name = "fs-opdsl"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Typed operator IR: physics operators defined once, lowered to residual apply, JVP, VJP/discrete adjoint, DWR indicators, preconditioner hints, and tile kernels."

[package.metadata.frankensim]
layer = "L3"

[features]
# I01.2 (bead i94v.1.1.2, ambition [F]): canonical ConstitutiveGraph
# adaptation stays default-off until it beats its declared baseline on
# the preregistered deck.
constitutive-graph = ["dep:fs-exec"]
# I01.3 (bead i94v.1.1.3, ambition [F]): neutral fs-couple port
# declarations lower into typed power equations only behind an explicit gate.
port-equations = ["dep:fs-iface"]

[dependencies]
fs-feec = { path = "../fs-feec" }
fs-iface = { path = "../fs-iface", optional = true }
fs-la = { path = "../fs-la" }
fs-material = { path = "../fs-material" }
fs-math = { path = "../fs-math" }
fs-qty = { path = "../fs-qty" }
fs-blake3 = { path = "../fs-blake3" }
fs-couple = { path = "../fs-couple" }
fs-rep-mesh = { path = "../fs-rep-mesh" }
fs-sparse = { path = "../fs-sparse" }
fs-tilelang = { path = "../fs-tilelang" }
fs-exec = { path = "../fs-exec", optional = true }

[dev-dependencies]
asupersync = { path = "../../../asupersync" }
fs-ad = { path = "../fs-ad" }
fs-alloc = { path = "../fs-alloc" }
fs-evidence = { path = "../fs-evidence" }
fs-matdb = { path = "../fs-matdb" }
fs-rand = { path = "../fs-rand" }

[lints]
workspace = true

[[test]]
name = "ports"
required-features = ["port-equations"]
