[package]
name = "fs-fft"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Stockham FFTs, real transforms and DCT, cache-blocked 3D pencils."

[package.metadata.frankensim]
layer = "L1"

[features]
# [F]-gated per the Ambition-Tag rule (bead 27d3): the cache-blocked
# fused two-pass six-step path for large even-log2 powers of two. Correct
# and golden-frozen, but still MEASURED SLOWER than the radix-8/4/2 stage
# walk on M4 after vectorized gather/scatter; it remains default-OFF on
# that ISA, with the current x86 verdict still pending.
frontier-sixstep = []

[dependencies]
fs-exec = { path = "../fs-exec" }
fs-math = { path = "../fs-math" }
fs-simd = { path = "../fs-simd" }

[dev-dependencies]
fs-math = { path = "../fs-math" }
fs-propcheck = { path = "../fs-propcheck" }
fs-roofline = { path = "../fs-roofline" }

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "sixstep"
required-features = ["frontier-sixstep"]
