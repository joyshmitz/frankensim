[package]
name = "fs-selfknow-e2e"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Structure & self-knowledge end-to-end battery: interface types, symmetry harvesting, spectral health, the abstraction ladder, explanation objects, and value-of-information — Layer 4 exercised as a whole with ledgered evidence and fail-safe assertions."

[package.metadata.frankensim]
layer = "L4"

[dependencies]
fs-evidence = { path = "../fs-evidence" }

[dev-dependencies]
fs-adjoint = { path = "../fs-adjoint", features = ["explanation-objects"] }
fs-iface = { path = "../fs-iface" }
fs-ledger = { path = "../fs-ledger" }
fs-plan = { path = "../fs-plan", features = ["voi-queries"] }
fs-spectral = { path = "../fs-spectral" }
fs-surrogate = { path = "../fs-surrogate", features = ["abstraction-ladder"] }
fs-symmetry = { path = "../fs-symmetry" }

[features]
# [S] suite, but gated so nightly lanes opt in explicitly.
selfknow-e2e = []

[lints]
workspace = true
