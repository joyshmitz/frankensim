[package]
name = "fs-opt"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Optimization problem IR: typed objective/constraint graphs over manifold variables, with validation, class propagation, and canonical serialization."

[package.metadata.frankensim]
layer = "L4"

[features]
# The parked numerics-spine IR battery (harvest reconciliation).
parked-ir-battery = []

[dependencies]
fs-blake3 = { path = "../fs-blake3" }
fs-exec = { path = "../fs-exec" }
fs-math = { path = "../fs-math" }
fs-obs = { path = "../fs-obs" }
fs-qty = { path = "../fs-qty" }

[dev-dependencies]
asupersync = { path = "../../../asupersync" }
fs-alloc = { path = "../fs-alloc" }
fs-propcheck = { path = "../fs-propcheck" }

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "ir_battery"
required-features = ["parked-ir-battery"]
