[package]
name = "fs-wasm"
version = "0.0.1"
edition = "2024"
publish = false
description = "Browser (WASM) surface over FrankenSim's pure numerical leaves — real math in the browser, no mocks."

# Its own workspace (like asupersync-wasm / franken_markdown): the wasm binding
# crate is decoupled from the native workspace so a browser build never depends
# on the state of unrelated in-progress crates.
[workspace]

[lib]
name = "fs_wasm"
crate-type = ["cdylib", "rlib"]

[package.metadata.frankensim]
layer = "L6"

[dependencies]
fs-sparse = { path = "../fs-sparse" }
fs-cheb = { path = "../fs-cheb" }
fs-rand = { path = "../fs-rand" }
fs-math = { path = "../fs-math" }
fs-ivl = { path = "../fs-ivl" }
fs-ad = { path = "../fs-ad" }
fs-fft = { path = "../fs-fft" }
fs-la = { path = "../fs-la" }
fs-ga = { path = "../fs-ga" }
# ── UNLOCKED upper-stack kernels (via asupersync wasm-browser-prod) ──
fs-geom = { path = "../fs-geom" }
fs-feec = { path = "../fs-feec" }
fs-flux = { path = "../fs-flux" }
fs-cutfem = { path = "../fs-cutfem" }
fs-solver = { path = "../fs-solver" }
fs-bo = { path = "../fs-bo" }
fs-xform = { path = "../fs-xform" }
fs-dfo = { path = "../fs-dfo" }
fs-symmetry = { path = "../fs-symmetry" }
# Support crates reached by the upper-stack demos (already in the transitive
# wasm build via fs-flux / fs-feec): the NS triangle-mesh generator and the
# tet-complex type the exterior-calculus demos construct.
fs-solid = { path = "../fs-solid" }
fs-rep-mesh = { path = "../fs-rep-mesh" }
# ── End-to-end CAMPAIGN kernels (Tier IV) — every one compiles to wasm32,
# so the certified campaign pipelines run live in the browser too. ──
fs-evidence = { path = "../fs-evidence" }
fs-sos = { path = "../fs-sos" }
fs-robust = { path = "../fs-robust" }
fs-tropical = { path = "../fs-tropical" }
fs-voi = { path = "../fs-voi" }
fs-spectral = { path = "../fs-spectral" }
fs-couple = { path = "../fs-couple" }
fs-rep-neural = { path = "../fs-rep-neural" }
fs-viz = { path = "../fs-viz" }
fs-shapeprog = { path = "../fs-shapeprog" }
fs-archive = { path = "../fs-archive" }
fs-fab = { path = "../fs-fab" }
fs-assimilate = { path = "../fs-assimilate" }
fs-toleralloc = { path = "../fs-toleralloc" }
fs-lattice = { path = "../fs-lattice" }
fs-truss = { path = "../fs-truss" }
fs-eproc = { path = "../fs-eproc" }
fs-lbm = { path = "../fs-lbm" }
# ── FLAGSHIP crates (Tier V): the three live end-to-end campaign pipelines
# (ornithoid / vessel / frame) and the leaf crates their stages compose. Each
# compiles to wasm32 so the flagships run live in the browser. ──
fs-ornith = { path = "../fs-ornith" }
fs-vessel = { path = "../fs-vessel" }
fs-frame = { path = "../fs-frame" }
fs-bem = { path = "../fs-bem" }
fs-vpm = { path = "../fs-vpm" }
fs-race = { path = "../fs-race" }
fs-render = { path = "../fs-render" }
fs-scenario = { path = "../fs-scenario" }
fs-uq = { path = "../fs-uq" }
fs-material = { path = "../fs-material" }
fs-exec = { path = "../fs-exec" }
fs-qty = { path = "../fs-qty" }
# ── The end-to-end CAMPAIGN crates themselves (Tier IV): each composes the
# leaf crates above into a certified pipeline, and each compiles to wasm32. ──
fs-robustopt-e2e = { path = "../fs-robustopt-e2e" }
fs-metamat-e2e = { path = "../fs-metamat-e2e" }
fs-flutter-e2e = { path = "../fs-flutter-e2e" }
fs-schedule-e2e = { path = "../fs-schedule-e2e" }
fs-truss-e2e = { path = "../fs-truss-e2e" }
fs-oed-e2e = { path = "../fs-oed-e2e" }
fs-neuroshape-e2e = { path = "../fs-neuroshape-e2e" }
fs-grammar-e2e = { path = "../fs-grammar-e2e" }
fs-adaptbo-e2e = { path = "../fs-adaptbo-e2e" }
fs-flowcert-e2e = { path = "../fs-flowcert-e2e" }

# wasm-bindgen only enters the wasm32 build — native builds stay dependency-clean.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
# asupersync in browser mode + JS-backed entropy for wasm32
asupersync = { path = "../../../asupersync", default-features = false, features = ["wasm-browser-prod"] }
getrandom = { version = "0.4", features = ["wasm_js"] }

[lints.rust]
unsafe_code = "forbid"
